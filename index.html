<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ton témoignage — Holy Brunch × Christ's Lovers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400;1,9..144,500&family=Work+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap" rel="stylesheet">
<style>
:root {
  --green-deep: #142B22;
  --green-mid: #1E4534;
  --gold: #E8A93A;
  --gold-light: #F6D77A;
  --red: #C23B3B;
  --cream: #F4EDE0;
  --black: #0E0F0C;
  --font-display: 'Anton', sans-serif;
  --font-serif: 'Fraunces', serif;
  --font-body: 'Work Sans', sans-serif;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  margin: 0;
  min-height: 100svh;
  font-family: var(--font-body);
  background:
    radial-gradient(90% 60% at 50% 0%, #2A5A44 0%, var(--green-deep) 40%, var(--black) 100%);
  color: var(--cream);
  position: relative;
  overflow-x: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 48px 20px;
}

@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; transition: none !important; }
}

/* ---------- AMBIANCE ---------- */
.glow {
  position: fixed;
  top: -15%;
  left: 50%;
  transform: translateX(-50%);
  width: 680px;
  height: 680px;
  max-width: 160vw;
  background: radial-gradient(circle, rgba(232,169,58,0.32) 0%, rgba(232,169,58,0) 65%);
  filter: blur(10px);
  animation: pulseGlow 6s ease-in-out infinite;
  pointer-events: none;
}

@keyframes pulseGlow {
  0%, 100% { opacity: 0.65; transform: translateX(-50%) scale(1); }
  50% { opacity: 1; transform: translateX(-50%) scale(1.06); }
}

.stars-layer { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }

.sparkle-star {
  position: absolute;
  bottom: -20px;
  background-color: rgba(246, 215, 122, 0.9);
  border-radius: 50%;
  box-shadow: 0 0 8px 2px rgba(246, 215, 122, 0.8), 0 0 16px 4px rgba(232, 169, 58, 0.4);
  animation: moveAndFade linear forwards;
}

@keyframes moveAndFade {
  0% { transform: translateY(0) scale(0.5); opacity: 0; }
  10% { opacity: 1; }
  50% { transform: translateY(-50vh) scale(1.2); }
  100% { transform: translateY(-105vh) scale(0.3); opacity: 0; }
}

/* ---------- CARTE PRINCIPALE ---------- */
.wrap { position: relative; z-index: 1; max-width: 560px; width: 100%; }

.flame-mark {
  display: block;
  margin: 0 auto 18px;
  width: 46px;
  height: 60px;
  animation: candleFlicker 3s ease-in-out infinite;
  transform-origin: 50% 100%;
  filter: drop-shadow(0 0 18px rgba(232,169,58,0.55));
}

@keyframes candleFlicker {
  0%, 100% { transform: scale(1) skewX(0deg); }
  30% { transform: scale(1.03, 0.97) skewX(0.8deg); }
  60% { transform: scale(0.97, 1.02) skewX(-0.6deg); }
}

.eyebrow {
  text-align: center;
  font-size: 0.75rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold-light);
  margin: 0 0 14px;
  font-weight: 600;
}

h1 {
  text-align: center;
  font-family: var(--font-serif);
  font-style: italic;
  font-weight: 500;
  font-size: clamp(1.7rem, 6vw, 2.5rem);
  line-height: 1.2;
  margin: 0 0 12px;
  color: var(--cream);
}

.prompt {
  text-align: center;
  font-family: var(--font-serif);
  font-style: italic;
  opacity: 0.7;
  font-size: 1rem;
  margin: 0 0 34px;
  min-height: 1.4em;
  transition: opacity 0.4s ease;
}

/* ---------- CARTE / PARCHEMIN ---------- */
.card {
  position: relative;
  background: linear-gradient(180deg, rgba(244,237,224,0.07), rgba(244,237,224,0.03));
  border: 1px solid rgba(232,169,58,0.35);
  border-radius: 22px;
  padding: 34px 28px;
  backdrop-filter: blur(6px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.05);
}

.field { margin-bottom: 22px; position: relative; }

.field label {
  display: block;
  font-size: 0.8rem;
  font-weight: 600;
  letter-spacing: 0.03em;
  margin-bottom: 8px;
  color: var(--gold-light);
}

.field .optional { font-weight: 400; opacity: 0.55; }

.field input, .field textarea {
  width: 100%;
  padding: 13px 16px;
  border-radius: 12px;
  border: 1.5px solid rgba(244,237,224,0.22);
  background: rgba(14,15,12,0.25);
  color: var(--cream);
  font-size: 1rem;
  font-family: var(--font-body);
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}

.field textarea {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: 1.08rem;
  line-height: 1.7;
  min-height: 160px;
  resize: vertical;
  background-image: repeating-linear-gradient(
    to bottom,
    transparent, transparent 1.68em,
    rgba(232,169,58,0.12) 1.68em, rgba(232,169,58,0.12) calc(1.68em + 1px)
  );
  background-position: 0 2.4em;
}

.field input::placeholder, .field textarea::placeholder { color: rgba(244,237,224,0.4); font-style: italic; }

.field input:focus-visible, .field textarea:focus-visible {
  outline: none;
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(232,169,58,0.22);
}

.char-count { text-align: right; font-size: 0.72rem; opacity: 0.5; margin-top: 6px; }

.btn-primary {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  color: var(--black);
  font-weight: 700;
  border: none;
  padding: 16px 34px;
  border-radius: 100px;
  font-size: 1rem;
  cursor: pointer;
  font-family: var(--font-body);
  transition: transform 0.15s ease, box-shadow 0.2s ease;
  box-shadow: 0 8px 24px rgba(232,169,58,0.25);
}

.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(232,169,58,0.35); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

.btn-secondary {
  display: block;
  width: 100%;
  background: transparent;
  color: var(--cream);
  border: 1.5px solid rgba(244,237,224,0.35);
  padding: 14px 30px;
  border-radius: 100px;
  font-size: 0.95rem;
  cursor: pointer;
  font-family: var(--font-body);
  margin-top: 12px;
  transition: border-color 0.2s ease, background 0.2s ease;
}

.btn-secondary:hover { border-color: var(--gold); background: rgba(232,169,58,0.08); }

.form-error {
  color: #ffb4b4;
  font-size: 0.85rem;
  margin: 0 0 16px;
  background: rgba(194,59,59,0.18);
  padding: 10px 14px;
  border-radius: 8px;
}

/* ---------- ÉTAT MERCI ---------- */
.done { text-align: center; display: none; }
.done.active { display: block; animation: fadeUp 0.6s ease; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.done-flame {
  width: 52px;
  height: 68px;
  margin: 0 auto 18px;
  animation: candleFlicker 3s ease-in-out infinite;
  filter: drop-shadow(0 0 22px rgba(232,169,58,0.6));
}

.done-title {
  font-family: var(--font-serif);
  font-style: italic;
  font-weight: 500;
  font-size: 1.6rem;
  margin: 0 0 10px;
  color: var(--gold-light);
}

.done-text { opacity: 0.8; margin: 0 0 30px; line-height: 1.6; }

form.hidden-form { display: none; }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="stars-layer" id="stars"></div>

  <div class="wrap">
    <svg class="flame-mark" viewBox="0 0 60 80" aria-hidden="true">
      <defs>
        <linearGradient id="flameGrad" x1="0" y1="1" x2="0" y2="0">
          <stop offset="0%" stop-color="#C23B3B"/>
          <stop offset="55%" stop-color="#E8A93A"/>
          <stop offset="100%" stop-color="#F6D77A"/>
        </linearGradient>
      </defs>
      <path fill="url(#flameGrad)" d="M30 3 C 18 18, 12 27, 12 42 C 12 59, 21 75, 30 75 C 39 75, 48 59, 48 42 C 48 29, 43 21, 39 27 C 39 18, 35 9, 30 3 Z"/>
    </svg>

    <p class="eyebrow">Refuge pour la restauration & Christ'S Lovers ont été heureux de vous présenter:</p>
	<p class="eyebrow">Holy  Brunch</p>
    <h1>« Raconte-nous ce que ce feu a allumé en toi »</h1>
    <p class="prompt" id="prompt">Qu'est-ce que cette journée a changé en toi ?</p>

    <div class="card">
      <form id="form-temoignage">
        <div class="field">
          <label for="nom">Ton prénom <span class="optional">(facultatif — reste anonyme si tu préfères)</span></label>
          <input type="text" id="nom" name="nom" placeholder="Ton prénom">
        </div>
        <div class="field">
          <label for="message">Ton témoignage *</label>
          <textarea id="message" name="message" required maxlength="3000" placeholder="Ton témognage peut fortifier quelqu'un."></textarea>
          <div class="char-count"><span id="char-count">0</span>/3000</div>
        </div>
        <p class="form-error" id="form-error" hidden></p>
        <button type="submit" class="btn-primary" id="submit-btn">
          <span>🔥</span> Envoyer mon témoignage
        </button>
      </form>

      <div class="done" id="done">
        <svg class="done-flame" viewBox="0 0 60 80" aria-hidden="true">
          <path fill="url(#flameGrad)" d="M30 3 C 18 18, 12 27, 12 42 C 12 59, 21 75, 30 75 C 39 75, 48 59, 48 42 C 48 29, 43 21, 39 27 C 39 18, 35 9, 30 3 Z"/>
        </svg>
        <p class="done-title">Merci d'avoir partagé ton cœur</p>
        <p class="done-text">Ton témoignage vient d'être reçu, il compte énormément pour nous.</p>
        <button class="btn-secondary" id="write-again">Écrire un autre témoignage</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://kmnavmsbdahwqftjhvzj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImttbmF2bXNiZGFod3FmdGpodnpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1ODc5MzAsImV4cCI6MjA5OTE2MzkzMH0.sNjJUOgLOuwGfv8k9lDSxwDAD2wdxQp4V-JIZXAdIF8";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    /* Étoiles montantes */
    function spawnStar(container) {
      if (!container) return;
      const star = document.createElement("div");
      star.className = "sparkle-star";
      star.style.left = Math.random() * 100 + "%";
      const size = Math.random() * 7 + 3;
      star.style.width = size + "px";
      star.style.height = size + "px";
      const duration = Math.random() * 5 + 4;
      star.style.animationDuration = duration + "s";
      star.style.opacity = Math.random() * 0.6 + 0.3;
      container.appendChild(star);
      setTimeout(() => star.remove(), duration * 1000);
    }
    const starsLayer = document.getElementById("stars");
    const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (!reducedMotion) setInterval(() => spawnStar(starsLayer), 500);

    /* Invites de réflexion tournantes */
    const prompts = [
      "Qu'est-ce que cette journée a changé en toi ?",
      "Quel moment restera gravé dans ta mémoire ?",
      "Qu'as-tu envie de dire à cette famille ?",
      "Quelle rencontre t'a marqué ?"
    ];
    let promptIndex = 0;
    const promptEl = document.getElementById("prompt");
    setInterval(() => {
      promptIndex = (promptIndex + 1) % prompts.length;
      promptEl.style.opacity = 0;
      setTimeout(() => {
        promptEl.textContent = prompts[promptIndex];
        promptEl.style.opacity = 0.7;
      }, 400);
    }, 5000);

    /* Formulaire */
    const form = document.getElementById("form-temoignage");
    const messageInput = document.getElementById("message");
    const nomInput = document.getElementById("nom");
    const charCount = document.getElementById("char-count");
    const formError = document.getElementById("form-error");
    const doneEl = document.getElementById("done");

    messageInput.addEventListener("input", () => {
      charCount.textContent = messageInput.value.length;
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      formError.hidden = true;
      const btn = document.getElementById("submit-btn");
      btn.disabled = true;
      btn.innerHTML = "<span>🔥</span> Envoi en cours…";

      const { error } = await sb.from("temoignages").insert({
        nom: nomInput.value.trim() || null,
        message: messageInput.value.trim()
      });

      if (error) {
        formError.textContent = "Une erreur est survenue. Réessaie dans un instant.";
        formError.hidden = false;
        btn.disabled = false;
        btn.innerHTML = "<span>🔥</span> Envoyer mon témoignage";
        return;
      }

      form.classList.add("hidden-form");
      doneEl.classList.add("active");
    });

    document.getElementById("write-again").addEventListener("click", () => {
      form.reset();
      charCount.textContent = "0";
      btn_reset();
      doneEl.classList.remove("active");
      form.classList.remove("hidden-form");
      nomInput.focus();
    });

    function btn_reset() {
      const btn = document.getElementById("submit-btn");
      btn.disabled = false;
      btn.innerHTML = "<span>🔥</span> Envoyer mon témoignage";
    }
  </script>
</body>
</html>
